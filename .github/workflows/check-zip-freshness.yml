name: Check ZIP Freshness

on:
  workflow_dispatch:
  push:
    paths:
      - 'wp-content/themes/**'
      - 'dist/zipped-themes/**'
      - 'scripts/validate-zip-freshness.sh'
      - '.github/workflows/check-zip-freshness.yml'
  pull_request:
    paths:
      - 'wp-content/themes/**'
      - 'dist/zipped-themes/**'
      - 'scripts/validate-zip-freshness.sh'
      - '.github/workflows/check-zip-freshness.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate ZIP freshness
        shell: bash
        run: |
          if [ -d wp-content/themes ]; then
            for theme_dir in wp-content/themes/nolan-showcase-theme-[0-9][0-9] wp-content/themes/[0-9][0-9][0-9]_nolan_young_theme_*; do
              [ -d "$theme_dir" ] || continue
              bash scripts/validate-zip-freshness.sh "$(basename "$theme_dir")"
            done
          fi
