name: Validate Theme

on:
  workflow_dispatch:
  push:
    paths:
      - 'wp-content/themes/**'
      - 'docs/**'
      - 'scripts/**'
      - 'contracts/**'
      - 'agents/**'
      - 'instructions/**'
      - 'dist/zipped-themes/**'
      - '.github/workflows/validate-theme.yml'
  pull_request:
    paths:
      - 'wp-content/themes/**'
      - 'docs/**'
      - 'scripts/**'
      - 'contracts/**'
      - 'agents/**'
      - 'instructions/**'
      - 'dist/zipped-themes/**'
      - '.github/workflows/validate-theme.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate generated themes
        shell: bash
        run: bash scripts/validate-all.sh
